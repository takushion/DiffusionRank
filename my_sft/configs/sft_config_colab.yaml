model:
  name: "GSAI-ML/LLaDA-1.5"
  rope_scaling_factor: 4.0

data:
  data_path: "datasets/rank_gpt4_all.jsonl"

training:
  output_dir: "/content/drive/MyDrive/checkpoints/llada1.5-sft"
  num_train_epochs: 1
  gradient_accumulation_steps: 4
  per_device_train_batch_size: 1
  logging_steps: 10
  save_steps: 500
  save_total_limit: 2
  learning_rate: 0.0001
  lr_scheduler_type: "constant"
  warmup_steps: 0
  weight_decay: 0.01
  bf16: true
  save_strategy: "steps"
  save_only_model: false
  report_to: "none"
  mask_strategy: "ranking_aware"
  dataloader_num_workers: 2

lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.0
  bias: "none"
  task_type: "CAUSAL_LM"
